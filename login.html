<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="src/favicon.ico" type="image/x-icon">
  <title>Авторизация - JettonAnalizer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style/main.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .auth-card {
      margin-top: 100px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center auth-card">
    <div class="col-md-4">
      <div class="card bg-dark text-white">
        <div class="card-header text-center">
          <h4>🔐 JettonAnalizer</h4>
        </div>
        <div class="card-body">
          <!-- Форма входа -->
          <div id="loginForm">
            <div class="mb-3">
              <label>Email</label>
              <input type="email" id="loginEmail" class="form-control" placeholder="user@example.com">
            </div>
            <div class="mb-3">
              <label>Пароль</label>
              <input type="password" id="loginPassword" class="form-control" placeholder="********">
            </div>
            <button class="btn btn-primary w-100 mb-2" id="loginBtn">Войти</button>
            <button class="btn btn-secondary w-100" id="showRegisterBtn">Зарегистрироваться</button>
          </div>

          <!-- Форма регистрации (скрыта) -->
          <div id="registerForm" style="display: none;">
            <div class="mb-3">
              <label>Email</label>
              <input type="email" id="regEmail" class="form-control" placeholder="user@example.com">
            </div>
            <div class="mb-3">
              <label>Пароль</label>
              <input type="password" id="regPassword" class="form-control" placeholder="********">
            </div>
            <div class="mb-3">
              <label>Повторите пароль</label>
              <input type="password" id="regPasswordConfirm" class="form-control" placeholder="********">
            </div>
            <button class="btn btn-success w-100 mb-2" id="registerBtn">Зарегистрироваться</button>
            <button class="btn btn-secondary w-100" id="showLoginBtn">Назад к входу</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Инициализация глобального клиента (если ещё не создан)
  if (!window.supabaseClient) {
    const SUPABASE_URL = 'https://mwwckbqqpcxltelwduuc.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_wyKGfavUluoEkE-9MsrKqw_vbniU1Rm';
    window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }

  // Перенаправление на главную страницу после входа
  async function redirectIfLoggedIn() {
    const { data: { user } } = await window.supabaseClient.auth.getUser();
    if (user) {
      window.location.href = 'index.html';
    }
  }

  // Обработчики
  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return alert('Введите email и пароль');
    const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
    if (error) alert('Ошибка: ' + error.message);
    else window.location.href = 'index.html';
  };

  document.getElementById('showRegisterBtn').onclick = () => {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
  };

  document.getElementById('showLoginBtn').onclick = () => {
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
  };

  document.getElementById('registerBtn').onclick = async () => {
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regPasswordConfirm').value;
    if (!email || !password) return alert('Введите email и пароль');
    if (password !== confirm) return alert('Пароли не совпадают');
    if (password.length < 6) return alert('Пароль не менее 6 символов');
    const { error } = await window.supabaseClient.auth.signUp({ email, password });
    if (error) alert('Ошибка: ' + error.message);
    else {
      alert('Регистрация успешна! Теперь войдите.');
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
    }
  };

  // Проверяем, если уже залогинены — идём на главную
  redirectIfLoggedIn();
</script>

</body>
</html>
